name: Docker Build & Publish
on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment (staging/prod)"
        required: false
        type: string
        default: ""
      version_tag:
        description: "Version tag (e.g. v1.0.0)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: arc-runner-set
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags and environment
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "float_tag=latest" >> $GITHUB_OUTPUT
            echo "version_tag=ghcr.io/yamete-development/winter:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.version_tag }}" != "" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "float_tag=latest" >> $GITHUB_OUTPUT
            echo "version_tag=ghcr.io/yamete-development/winter:${{ github.event.inputs.version_tag }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "float_tag=staging" >> $GITHUB_OUTPUT
            echo "version_tag=" >> $GITHUB_OUTPUT
          fi
          echo "sha_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/yamete-development/winter:${{ steps.vars.outputs.sha_tag }}
            ghcr.io/yamete-development/winter:${{ steps.vars.outputs.float_tag }}
            ${{ steps.vars.outputs.version_tag }}

      - name: Update GitOps repo
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          APP_DIR="winter"
          ENV="${{ steps.vars.outputs.environment }}"
          SHA="${{ steps.vars.outputs.sha_tag }}"

          git clone --depth 1 \
            "https://x-access-token:${GITOPS_PAT}@github.com/yamete-development/interchat-kube-talos.git" \
            /tmp/gitops

          cd /tmp/gitops

          KUSTOMIZATION="kubernetes/apps/${APP_DIR}/overlays/${ENV}/kustomization.yaml"

          sed -i "s/newTag:.*/newTag: ${SHA}/" "$KUSTOMIZATION"

          git config user.name "ci-bot"
          git config user.email "ci-bot@interchat.fun"
          git add "$KUSTOMIZATION"
          git commit -m "deploy(${APP_DIR}-${ENV}): ${SHA}" || echo "No changes to commit"
          git push origin main
